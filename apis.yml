aid: swift-transportation
name: Swift Transportation
description: >-
  Swift Transportation, now operating as Knight-Swift Transportation Holdings
  (KNX), is the largest full truckload motor carrier in North America. The
  company provides truckload, LTL, logistics, and intermodal transportation
  services across the US, Mexico, and Canada. Technology integration is
  primarily through EDI for freight tendering, shipment status, and invoicing
  workflows with trading partners and shippers.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - EDI
  - Freight
  - Logistics
  - Transportation
  - Truckload
url: >-
