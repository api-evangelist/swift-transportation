created: '2026-03-24'
modified: '2026-05-03'
specificationVersion: '0.19'
apis:
  - aid: swift-transportation:knight-swift-edi
    name: Knight-Swift EDI Integration
    description: >-
      Knight-Swift Transportation supports EDI integration for freight tendering,
      shipment tracking, and invoicing. Trading partners can submit load tenders
      (EDI 204), receive responses (EDI 990), get shipment status updates
      (EDI 214), and process freight invoices (EDI 210) via standard ANSI X12
      EDI transactions.
    humanURL: https://www.knighttrans.com/
